<section id="product-page" class="section-pad">
  <div class="container">
    <a href="index.html" class="back-link"><span class="arrow">→</span><span data-i18n="productPage.back">العودة إلى المجموعة</span></a>
    <div class="product-page-grid">
      <div class="product-page-gallery"><img id="ppImg" src="" alt=""></div>
      <div class="product-page-info">
        <span class="p-tag" id="ppTag"></span>
        <h1 id="ppName"></h1>
        <div class="pp-price" id="ppPrice"></div>
        <p class="pp-desc" id="ppDesc"></p>
        <ul class="modal-features" id="ppFeatures"></ul>

        <div class="order-form-wrap">
          <h3 data-i18n="form.title">املأ البيانات لإتمام الطلب</h3>
          <form id="orderForm">
            <div class="form-row">
              <div class="field">
                <label data-i18n="form.firstName">الاسم</label>
                <input type="text" id="fFirstName" required>
              </div>
              <div class="field">
                <label data-i18n="form.lastName">اللقب</label>
                <input type="text" id="fLastName" required>
              </div>
            </div>
            <div class="field">
              <label data-i18n="form.city">المدينة</label>
              <input type="text" id="fCity" required>
            </div>
            <div class="form-row">
              <div class="field">
                <label data-i18n="form.quantity">الكمية</label>
                <input type="number" id="fQty" min="1" value="1" required>
              </div>
              <div class="field">
                <label data-i18n="form.phone">رقم الهاتف</label>
                <input type="tel" id="fPhone" required>
              </div>
            </div>
            <div class="field">
              <label data-i18n="form.note">ملاحظة (اختياري)</label>
              <textarea id="fNote"></textarea>
            </div>
            <button type="submit" class="btn btn-wa btn-lg btn-block" id="formSubmitBtn">
              <svg viewBox="0 0 24 24"><path d="M17.5 14.4c-.3-.1-1.7-.9-2-1-.3-.1-.5-.1-.6.1-.2.3-.7 1-.9 1.2-.2.2-.3.2-.6.1-.3-.1-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.1.2-.3.3-.4.1-.2 0-.3 0-.5s-.6-1.5-.9-2c-.2-.5-.5-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 2 3.1 4.9 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.1-.3-.2-.6-.3z"/><path d="M12 2C6.5 2 2 6.5 2 12c0 1.9.5 3.7 1.5 5.3L2 22l4.8-1.5c1.5.8 3.3 1.3 5.2 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18.3c-1.7 0-3.4-.5-4.8-1.4l-.3-.2-3.2 1 1-3.2-.2-.3C3.5 14.7 3 13.4 3 12c0-4.9 4.1-9 9-9s9 4.1 9 9-4.1 9-9 9z"/></svg>
              <span id="formSubmitLabel" data-i18n="form.submit">إرسال الطلب عبر واتساب</span>
            </button>
            <p class="form-note" data-i18n="form.note2">سيتم إرسال بياناتك مباشرة إلى واتساب لتأكيد الطلب.</p>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
